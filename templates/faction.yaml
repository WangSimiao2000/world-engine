# 势力模板定义 / Faction Template Definition
# 用于定义世界观中的势力（国家/组织/势力）设定
# For defining faction (nation/organization/power) settings in the world

category: faction

description:
  zh: 势力设定模板，用于定义世界观中的国家、组织和势力
  en: Faction template for defining nations, organizations and powers in the world

required:
  - name: id
    type: string
    description:
      zh: 唯一标识符，格式为 faction-<name>
      en: Unique identifier, format faction-<name>
    constraints:
      - type: regex
        value: "^faction-[a-z0-9-]+$"
        errorCode: ERR_CONSTRAINT_REGEX
        errorMessage:
          zh: "ID 格式错误，应为 faction-<name>"
          en: "Invalid ID format, should be faction-<name>"

  - name: name
    type: bilingual
    description:
      zh: 势力名称（中文必填，英文选填）
      en: Faction name (Chinese required, English optional)

  - name: epoch
    type: epoch_ref
    description:
      zh: 所属纪元 ID（势力活跃的时代）
      en: Epoch ID (era when this faction is active)
    constraints:
      - type: ref_exists
        value: epoch
        errorCode: ERR_REF_EPOCH
        errorMessage:
          zh: "引用的纪元 ID 不存在"
          en: "Referenced epoch ID does not exist"

  - name: faction_type
    type: string
    description:
      zh: 势力类型
      en: Faction type
    constraints:
      - type: enum
        value: ["nation", "kingdom", "empire", "tribe", "clan", "guild", "order", "sect", "alliance", "other"]
        errorCode: ERR_CONSTRAINT_ENUM
        errorMessage:
          zh: "势力类型必须为 nation, kingdom, empire, tribe, clan, guild, order, sect, alliance, other 之一"
          en: "Faction type must be one of nation, kingdom, empire, tribe, clan, guild, order, sect, alliance, other"

  - name: active_status
    type: boolean
    description:
      zh: 是否仍活跃（true=活跃，false=已消亡）
      en: Whether still active (true=active, false=dissolved)

optional:
  - name: description
    type: bilingual
    description:
      zh: 势力描述
      en: Faction description

  - name: prose
    type: bilingual
    description:
      zh: 叙事散文（Markdown 格式）
      en: Narrative prose (Markdown format)

  - name: founding_year
    type: integer
    description:
      zh: 建立年份（纪元内）
      en: Founding year (within epoch)
    constraints:
      - type: range
        value: { min: 1 }
        errorCode: ERR_CONSTRAINT_RANGE
        errorMessage:
          zh: "年份必须为正整数"
          en: "Year must be a positive integer"

  - name: dissolution_year
    type: integer
    description:
      zh: 消亡年份（纪元内）
      en: Dissolution year (within epoch)
    constraints:
      - type: range
        value: { min: 1 }
        errorCode: ERR_CONSTRAINT_RANGE
        errorMessage:
          zh: "年份必须为正整数"
          en: "Year must be a positive integer"

  - name: leader
    type: entity_ref
    refCategory: character
    description:
      zh: 领袖人物 ID
      en: Leader character ID

  - name: headquarters
    type: entity_ref
    refCategory: location
    description:
      zh: 总部地点 ID
      en: Headquarters location ID

  - name: territories
    type: array<entity_ref>
    description:
      zh: 控制领土 ID 列表
      en: List of controlled territory IDs

  - name: allies
    type: array<entity_ref>
    description:
      zh: 盟友势力 ID 列表
      en: List of allied faction IDs

  - name: enemies
    type: array<entity_ref>
    description:
      zh: 敌对势力 ID 列表
      en: List of enemy faction IDs

  - name: versioning
    type: versioning
    description:
      zh: 版本信息（正史/野史标记）
      en: Versioning information (canon/non-canon marking)
