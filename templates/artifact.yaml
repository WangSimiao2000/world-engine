# 神器模板定义 / Artifact Template Definition
# 用于定义世界观中的神器/宝物设定
# For defining artifact/treasure settings in the world

category: artifact

description:
  zh: 神器设定模板，用于定义世界观中的神器和宝物
  en: Artifact template for defining artifacts and treasures in the world

required:
  - name: id
    type: string
    description:
      zh: 唯一标识符，格式为 artifact-<name>
      en: Unique identifier, format artifact-<name>
    constraints:
      - type: regex
        value: "^artifact-[a-z0-9-]+$"
        errorCode: ERR_CONSTRAINT_REGEX
        errorMessage:
          zh: "ID 格式错误，应为 artifact-<name>"
          en: "Invalid ID format, should be artifact-<name>"

  - name: name
    type: bilingual
    description:
      zh: 神器名称（中文必填，英文选填）
      en: Artifact name (Chinese required, English optional)

optional:
  - name: description
    type: bilingual
    description:
      zh: 神器描述
      en: Artifact description

  - name: prose
    type: bilingual
    description:
      zh: 叙事散文（Markdown 格式）
      en: Narrative prose (Markdown format)

  - name: artifact_type
    type: string
    description:
      zh: 神器类型
      en: Artifact type
    constraints:
      - type: enum
        value: ["weapon", "armor", "accessory", "tool", "container", "vehicle", "structure", "other"]
        errorCode: ERR_CONSTRAINT_ENUM
        errorMessage:
          zh: "神器类型必须为 weapon, armor, accessory, tool, container, vehicle, structure, other 之一"
          en: "Artifact type must be one of weapon, armor, accessory, tool, container, vehicle, structure, other"

  - name: rarity
    type: string
    description:
      zh: 稀有度
      en: Rarity level
    constraints:
      - type: enum
        value: ["common", "uncommon", "rare", "legendary", "mythical", "divine"]
        errorCode: ERR_CONSTRAINT_ENUM
        errorMessage:
          zh: "稀有度必须为 common, uncommon, rare, legendary, mythical, divine 之一"
          en: "Rarity must be one of common, uncommon, rare, legendary, mythical, divine"

  - name: powers
    type: array<string>
    description:
      zh: 神器能力列表
      en: List of artifact powers

  - name: creator
    type: entity_ref
    refCategory: character
    description:
      zh: 创造者人物 ID
      en: Creator character ID

  - name: creation_epoch
    type: epoch_ref
    description:
      zh: 创造纪元 ID
      en: Creation epoch ID

  - name: creation_year
    type: integer
    description:
      zh: 创造年份（纪元内）
      en: Creation year (within epoch)
    constraints:
      - type: range
        value: { min: 1 }
        errorCode: ERR_CONSTRAINT_RANGE
        errorMessage:
          zh: "年份必须为正整数"
          en: "Year must be a positive integer"

  - name: current_owner
    type: entity_ref
    refCategory: character
    description:
      zh: 当前持有者人物 ID
      en: Current owner character ID

  - name: current_location
    type: entity_ref
    refCategory: location
    description:
      zh: 当前所在地点 ID
      en: Current location ID

  - name: previous_owners
    type: array<entity_ref>
    description:
      zh: 历任持有者人物 ID 列表
      en: List of previous owner character IDs

  - name: versioning
    type: versioning
    description:
      zh: 版本信息（正史/野史标记）
      en: Versioning information (canon/non-canon marking)
