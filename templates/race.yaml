# 种族模板定义 / Race Template Definition
# 用于定义世界观中的种族设定
# For defining race settings in the world

category: race

description:
  zh: 种族设定模板，用于定义世界观中的种族
  en: Race template for defining races in the world

required:
  - name: id
    type: string
    description:
      zh: 唯一标识符，格式为 race-<name>
      en: Unique identifier, format race-<name>
    constraints:
      - type: regex
        value: "^race-[a-z0-9-]+$"
        errorCode: ERR_CONSTRAINT_REGEX
        errorMessage:
          zh: "ID 格式错误，应为 race-<name>"
          en: "Invalid ID format, should be race-<name>"

  - name: name
    type: bilingual
    description:
      zh: 种族名称（中文必填，英文选填）
      en: Race name (Chinese required, English optional)

  - name: average_lifespan
    type: integer
    description:
      zh: 平均寿命（年）
      en: Average lifespan (years)
    constraints:
      - type: range
        value: { min: 1 }
        errorCode: ERR_CONSTRAINT_RANGE
        errorMessage:
          zh: "平均寿命必须为正整数"
          en: "Average lifespan must be a positive integer"

  - name: habitat
    type: bilingual
    description:
      zh: 栖息地描述
      en: Habitat description

optional:
  - name: description
    type: bilingual
    description:
      zh: 种族描述
      en: Race description

  - name: prose
    type: bilingual
    description:
      zh: 叙事散文（Markdown 格式）
      en: Narrative prose (Markdown format)

  - name: traits
    type: array<string>
    description:
      zh: 种族特征列表
      en: List of racial traits

  - name: origin_epoch
    type: epoch_ref
    description:
      zh: 起源纪元 ID
      en: Origin epoch ID

  - name: versioning
    type: versioning
    description:
      zh: 版本信息（正史/野史标记）
      en: Versioning information (canon/non-canon marking)
