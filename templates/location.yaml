# 地理模板定义 / Location Template Definition
# 用于定义世界观中的地理位置设定
# For defining location/geography settings in the world

category: location

description:
  zh: 地理设定模板，用于定义世界观中的地理位置
  en: Location template for defining geographical locations in the world

required:
  - name: id
    type: string
    description:
      zh: 唯一标识符，格式为 loc-<name>
      en: Unique identifier, format loc-<name>
    constraints:
      - type: regex
        value: "^loc-[a-z0-9-]+$"
        errorCode: ERR_CONSTRAINT_REGEX
        errorMessage:
          zh: "ID 格式错误，应为 loc-<name>"
          en: "Invalid ID format, should be loc-<name>"

  - name: name
    type: bilingual
    description:
      zh: 地点名称（中文必填，英文选填）
      en: Location name (Chinese required, English optional)

  - name: region
    type: bilingual
    description:
      zh: 所属区域
      en: Region this location belongs to

  - name: epoch
    type: epoch_ref
    description:
      zh: 所属纪元 ID（地点存在的时代）
      en: Epoch ID (era when this location exists)
    constraints:
      - type: ref_exists
        value: epoch
        errorCode: ERR_REF_EPOCH
        errorMessage:
          zh: "引用的纪元 ID 不存在"
          en: "Referenced epoch ID does not exist"

optional:
  - name: description
    type: bilingual
    description:
      zh: 地点描述
      en: Location description

  - name: prose
    type: bilingual
    description:
      zh: 叙事散文（Markdown 格式）
      en: Narrative prose (Markdown format)

  - name: location_type
    type: string
    description:
      zh: 地点类型
      en: Location type
    constraints:
      - type: enum
        value: ["city", "village", "mountain", "river", "forest", "desert", "ocean", "island", "plain", "ruins", "sacred", "other"]
        errorCode: ERR_CONSTRAINT_ENUM
        errorMessage:
          zh: "地点类型必须为有效的枚举值"
          en: "Location type must be a valid enum value"

  - name: controlling_faction
    type: entity_ref
    refCategory: faction
    description:
      zh: 控制势力 ID
      en: Controlling faction ID

  - name: parent_location
    type: entity_ref
    refCategory: location
    description:
      zh: 上级地点 ID（用于层级关系）
      en: Parent location ID (for hierarchical relationships)

  - name: versioning
    type: versioning
    description:
      zh: 版本信息（正史/野史标记）
      en: Versioning information (canon/non-canon marking)
