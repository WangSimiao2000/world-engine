# 动物模板定义 / Creature Template Definition
# 用于定义世界观中的动物/生物设定
# For defining creature/animal settings in the world

category: creature

description:
  zh: 动物设定模板，用于定义世界观中的动物和生物
  en: Creature template for defining animals and creatures in the world

required:
  - name: id
    type: string
    description:
      zh: 唯一标识符，格式为 creature-<name>
      en: Unique identifier, format creature-<name>
    constraints:
      - type: regex
        value: "^creature-[a-z0-9-]+$"
        errorCode: ERR_CONSTRAINT_REGEX
        errorMessage:
          zh: "ID 格式错误，应为 creature-<name>"
          en: "Invalid ID format, should be creature-<name>"

  - name: name
    type: bilingual
    description:
      zh: 生物名称（中文必填，英文选填）
      en: Creature name (Chinese required, English optional)

optional:
  - name: description
    type: bilingual
    description:
      zh: 生物描述
      en: Creature description

  - name: prose
    type: bilingual
    description:
      zh: 叙事散文（Markdown 格式）
      en: Narrative prose (Markdown format)

  - name: habitat
    type: bilingual
    description:
      zh: 栖息地描述
      en: Habitat description

  - name: average_lifespan
    type: integer
    description:
      zh: 平均寿命（年）
      en: Average lifespan (years)
    constraints:
      - type: range
        value: { min: 1 }
        errorCode: ERR_CONSTRAINT_RANGE
        errorMessage:
          zh: "平均寿命必须为正整数"
          en: "Average lifespan must be a positive integer"

  - name: danger_level
    type: string
    description:
      zh: 危险等级
      en: Danger level
    constraints:
      - type: enum
        value: ["harmless", "low", "medium", "high", "extreme"]
        errorCode: ERR_CONSTRAINT_ENUM
        errorMessage:
          zh: "危险等级必须为 harmless, low, medium, high, extreme 之一"
          en: "Danger level must be one of harmless, low, medium, high, extreme"

  - name: locations
    type: array<entity_ref>
    description:
      zh: 出没地点 ID 列表
      en: List of location IDs where this creature appears

  - name: versioning
    type: versioning
    description:
      zh: 版本信息（正史/野史标记）
      en: Versioning information (canon/non-canon marking)
