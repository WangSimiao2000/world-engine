# ============================================================
# 历史事件示例文件 / History Event Example File
# ============================================================
# 此文件以 _ 开头，不参与 CI 验证和正常读取
# This file starts with _ and is excluded from CI validation
# 
# 用途 / Purpose:
# - 展示历史事件设定的完整格式 / Show complete history event format
# - 作为新建历史事件的参考模板 / Reference template for new events
# ============================================================

template: history
id: event-example-great-war  # 唯一标识符，格式: event-<name> / Unique ID, format: event-<name>

# ============================================================
# 必填项 / Required Fields
# ============================================================

# 事件名称 / Event Name
# zh: 中文名称（必填）/ Chinese name (required)
# en: 英文名称（选填）/ English name (optional)
name:
  zh: "诸神之战"
  en: "War of the Gods"

# 起始纪元 ID / Start Epoch ID
# 必须引用已存在的纪元 / Must reference an existing epoch
start_epoch: "epoch-second-age"

# 起始年份（纪元内）/ Start Year (within epoch)
# 必须为正整数 / Must be a positive integer
start_year: 500

# 参与人物 ID 列表 / List of Participant Character IDs
# 必须引用已存在的人物 / Must reference existing characters
participants:
  - "char-god-of-light"
  - "char-god-of-darkness"
  - "char-hero-ancient"

# 版本信息 / Versioning Information
versioning:
  canon: true
  source: "author-main"
  priority: official

# ============================================================
# 可选项 / Optional Fields
# ============================================================

# 结束纪元 ID / End Epoch ID
# 未填写表示瞬时事件 / Empty means instantaneous event
end_epoch: "epoch-second-age"

# 结束年份（纪元内）/ End Year (within epoch)
end_year: 550

# 事件描述 / Event Description
description:
  zh: "第二纪元最惨烈的战争，光明与黑暗两大神系的全面冲突，最终导致了旧世界的毁灭。"
  en: "The most devastating war of the Second Age, a full-scale conflict between the pantheons of Light and Darkness, ultimately leading to the destruction of the old world."

# 叙事散文（Markdown 格式）/ Narrative Prose (Markdown format)
prose:
  zh: |
    ## 战争起因
    
    黑暗之神试图打破世界的平衡，引发了光明诸神的反击。
    
    ## 关键战役
    
    - **天界之战**：诸神在天界的第一次正面交锋
    - **凡间浩劫**：战火蔓延至凡间，无数城市化为废墟
    - **最终决战**：在世界之巅的终极对决
    
    ## 战争影响
    
    这场战争彻底改变了世界的格局，开启了第三纪元。
  en: |
    ## Cause of War
    
    The God of Darkness attempted to break the world's balance, triggering a counterattack from the Gods of Light.
    
    ## Key Battles
    
    - **Battle of the Heavens**: First direct confrontation between the gods in the celestial realm
    - **Mortal Catastrophe**: War spread to the mortal realm, countless cities reduced to ruins
    - **Final Showdown**: Ultimate confrontation at the peak of the world
    
    ## War's Impact
    
    This war completely reshaped the world, ushering in the Third Age.

# 发生地点 ID 列表 / List of Location IDs
locations:
  - "loc-celestial-realm"
  - "loc-world-peak"
  - "loc-ancient-capital"

# 相关势力 ID 列表 / List of Related Faction IDs
factions:
  - "faction-light-pantheon"
  - "faction-dark-pantheon"

# 相关神器 ID 列表 / List of Related Artifact IDs
artifacts:
  - "artifact-sword-of-light"
  - "artifact-dark-crown"

# 事件类型 / Event Type
# 可选值: war, treaty, discovery, creation, destruction, migration, founding, death, birth, other
event_type: "war"
