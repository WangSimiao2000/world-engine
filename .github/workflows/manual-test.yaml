# WorldEngine Manual Test Workflow
# 手动触发的测试工作流
#
# 用途：手动运行所有测试
# 触发方式：在 GitHub Actions 页面点击 "Run workflow"

name: Manual Test

on:
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npm run build
      
      - name: Run tests
        run: npm test
      
      - name: Summary
        run: echo "✅ 测试完成 / Tests completed"
