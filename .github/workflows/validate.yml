name: Validate World Data

on:
  pull_request:
    paths:
      - 'world/**'
      - 'schemas/**'
      - 'engine/**'

jobs:
  schema-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -e .
      - run: worldengine validate --schema

  rule-validation:
    needs: schema-validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -e .
      - run: worldengine validate --rules

  ai-review:
    needs: rule-validation
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -e .
      - name: Run AI review
        id: ai
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "No OPENAI_API_KEY set, skipping AI review."
            exit 0
          fi
          worldengine ai-review --changed-only --output json > ai-results.json
      - name: Post AI review comments
        if: hashFiles('ai-results.json') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const results = JSON.parse(fs.readFileSync('ai-results.json', 'utf8'));
              let body = '## 🤖 AI Lore Review\n\n';
              for (const r of results) {
                body += `### ${r.file}\n`;
                for (const c of r.checks) {
                  const icon = c.passed ? '✅' : c.severity === 'error' ? '❌' : '⚠️';
                  body += `${icon} **${c.check}**: ${c.message}\n`;
                  if (c.suggestion) body += `  → ${c.suggestion}\n`;
                }
                body += '\n';
              }
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            } catch (e) {
              console.log('No AI results to post.');
            }
